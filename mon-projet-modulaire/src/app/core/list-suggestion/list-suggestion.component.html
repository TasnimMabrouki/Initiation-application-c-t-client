<!-- list-suggestion.component.html -->
<div class="container">
  <h2>Liste des suggestions</h2>
  <button class="btn btn-primary" [routerLink]="['/add']">Ajouter une suggestion</button>
  
  <div class="suggestion-list">
    <div *ngFor="let suggestion of suggestions" class="suggestion-card">
      <h3>{{ suggestion.title }}</h3>
      <p>{{ suggestion.description }}</p>
      <p>Catégorie: {{ suggestion.category }}</p>
      <p>Statut: {{ suggestion.status }}</p>
      <p>Likes: {{ suggestion.nbLikes }}</p>
      
      <button class="btn btn-danger" (click)="deleteSuggestion(suggestion.id)">Supprimer</button>
      <button class="btn btn-info" [routerLink]="['/details', suggestion.id]">Détails</button>
      <button class="btn btn-success" (click)="likeSuggestion(suggestion)">Like</button>
    </div>
  </div>
</div>
